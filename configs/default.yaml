mode: "train" # options: "train", "preprocess"

# In train mode, iterate through these model configs:
models_to_train: ["eegnet"] # Use ["all"] to iterate all models in configs/model/
model_save_dir: "data/trained_models"

defaults:
  - _self_
  - model: eegnet   # loads configs/model/eegnet.yaml -> cfg.model.*

preprocessing:
  high_pass: 4.0
  low_pass: 40.0
  target_sample_rate: 128
  ica: true
  reference_channels: ["M1", "M2"]
  eog_channels: ["VEOG", "HEOG"]
  test_size: 0.2

  # Epoch extraction window (seconds relative to event onset)
  tmin: -0.5
  tmax: 4.0

  # Baseline correction window (seconds relative to epoch start)
  baseline_correction: true
  baseline_tmin: -0.2   # null = start of epoch
  baseline_tmax: 0.0

  # Marker-to-label mapping: each key is the raw annotation string from the .set file.
  # Multiple markers can map to the same label (e.g. rest pooling).
  # Change values to control how many classes the model sees.
  class_map:
    "11": 0   # right biceps
    "12": 1   # right triceps
    "13": 2   # resting
    "98": 0   # resting eyes open (not used in main train split)
    "99": 0   # resting eyes closed (not used in main train split)

  # Data splitting into subfolders
  splits:
    preprocessed: ["11", "12", "13"]
    eyes_open: ["98"]
    eyes_closed: ["99"]

data:
  raw_path: "data/raw"
  preprocessed_path: "data"
  vps: ["VP110", "VP111"]
  epoched_path: "data/preprocessed"
