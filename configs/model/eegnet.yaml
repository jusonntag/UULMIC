# EEGNet architecture config
# Lawhern, V. J., Solon, A. J., Waytowich, N. R., Gordon, S. M., Hung, C. P.,
# Lance, B. J. (2018). EEGNet: a compact convolutional neural network for
# EEG-based brain–computer interfaces. J. Neural Eng. 15:056013.
# doi: 10.1088/1741-2552/aace8c

name: "eegnet"

# Training hyperparameters
epochs: 10
lr: 0.001
batch_size: 8
training_mode: "independent" # "combined" 
optimizer: "adamw"
loss: "cross_entropy"
metrics: ["accuracy"]
n_classes: 3
which_classes: ["right biceps", "right triceps", "resting"]
output_activation: "log_softmax"
weight_decay: 0.0
lr_scheduler: null
early_stopping_patience: 10
seed: 42

# Architecture hyperparameters
# These are read by EEGNet.__init__(config) directly.
# channels and samples must match the preprocessed data shape:
#   channels = number of EEG channels after preprocessing
#   samples  = int((tmax - tmin) * target_sample_rate) + 1
F1: 8             # Number of temporal filters
D: 2              # Depth multiplier (F2 = F1 * D = 16)
kernLength: 62    # Temporal kernel length (= target_sample_rate / 2 is a good rule of thumb)
dropoutRate: 0.5
dropoutType: "spatial"   # "spatial" = Dropout2d | "base" = Dropout
channels: 62      # Target channel count
samples: 577      # Target samples at 128Hz
bias: false
